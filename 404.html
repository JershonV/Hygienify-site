<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Hygienify</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 font-sans min-h-screen flex items-center justify-center relative overflow-hidden px-6">

    <!-- Decorative Background Radial Ambient Light -->
    <div class="absolute w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-[150px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

    <div class="max-w-md w-full text-center relative z-10">
        <!-- Floating Visual Container -->
        <div class="animate-float inline-block mb-6 relative">
            <!-- Neon backdrop element -->
            <div class="absolute inset-0 bg-cyan-500/20 blur-2xl rounded-full"></div>
            
            <!-- Graphic Layer -->
            <div class="relative w-24 h-24 bg-[#0b1329] border border-cyan-500/30 rounded-2xl flex items-center justify-center text-4xl shadow-xl shadow-cyan-950/40">
                <i class="fa-solid fa-soap text-cyan-400"></i>
                <!-- Small warning badge clipped to icon corner -->
                <span class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-[#020617]">404</span>
            </div>
        </div>

        <!-- Text Elements -->
        <h1 class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight">404</h1>
        <h2 class="text-2xl font-bold mt-2 text-white">This Page Has Been Sanitized</h2>
        <p class="text-slate-400 text-sm mt-3 leading-relaxed">
            The resource pipeline you followed doesn't exist, has been archived, or was wiped clean by our system administrators.
        </p>

        <!-- Dynamic Utility Navigation Buttons -->
        <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="index.html" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 text-sm font-semibold bg-gradient-to-r from-cyan-500 to-blue-500 text-slate-950 px-5 py-2.5 rounded-xl hover:from-cyan-400 hover:to-blue-400 shadow-lg shadow-cyan-500/10 hover:shadow-cyan-500/20 transition-all duration-300 transform hover:-translate-y-0.5">
                <i class="fa-solid fa-house text-xs"></i> Return Home
            </a>
            <button onclick="window.history.back()" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 text-sm font-medium bg-slate-900 border border-slate-800 text-slate-300 px-5 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-300">
                <i class="fa-solid fa-arrow-left text-xs"></i> Go Back
            </button>
        </div>
    </div>

    <!-- Micro Subtle Bottom Tech Deco Lines -->
    <div class="absolute bottom-4 left-0 right-0 text-center text-[11px] text-slate-600 tracking-wider uppercase font-mono selection:bg-transparent pointer-events-none">
        System Node Status: Operational // Endpoint Broken
    </div>

</body>
</html>
