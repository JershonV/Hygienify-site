<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .admin-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body class="min-h-screen hidden" id="admin-body">

    <!-- Top Security Nav Wrapper -->
    <nav class="border-b border-white/10 bg-slate-950/50 backdrop-blur-md px-4 sm:px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <!-- Replaced with your native SVG logo element -->
            <img src="logo_new2.svg" alt="Hygienify Logo" class="w-8 h-8 object-contain">
            <h1 class="text-lg font-black uppercase tracking-widest text-white">Admin Panel</h1>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
            <span id="admin-email" class="text-[11px] sm:text-xs font-bold text-slate-400 bg-white/5 border border-white/10 px-3 py-1.5 rounded-full truncate max-w-[180px] sm:max-w-xs"></span>
            <button id="logout-btn" class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-black text-xs font-black uppercase tracking-wider px-4 py-2 rounded-xl cursor-pointer transition-all border border-red-500/20">
                Sign Out
            </button>
        </div>
    </nav>

    <!-- Content Workspace Grid -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 space-y-6 sm:space-y-10">
        
        <!-- Welcome Jumbotron Hero Banner -->
        <div class="admin-card rounded-[2rem] p-6 sm:p-10 relative overflow-hidden flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <span class="text-xs font-black uppercase tracking-[0.4em] text-cyan-400 mb-2 block">System Authorized</span>
                <h2 class="text-2xl sm:text-4xl font-black text-white tracking-tight">System Administrative Hub</h2>
                <p class="text-xs sm:text-sm text-slate-400 mt-2 max-w-xl">Log volunteer action metrics, edit profiles, erase accounts, and assign service hours from this panel.</p>
            </div>
            <div class="bg-cyan-500/10 border border-cyan-500/20 rounded-2xl px-6 py-4 text-center w-full md:w-auto">
                <span class="text-xs text-slate-400 uppercase tracking-widest block font-bold mb-1">Total Volunteers</span>
                <span id="stat-total-volunteers" class="text-3xl font-black text-white font-mono">...</span>
            </div>
        </div>

        <!-- Section: Active Logs & Operational Actions -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 sm:gap-8">
            
            <!-- Left Panel Column: Volunteer Management Roster Grid -->
            <div class="lg:col-span-2 space-y-6">
                <div class="admin-card rounded-[2rem] p-4 sm:p-6">
                    <h3 class="text-base sm:text-lg font-black tracking-wider uppercase text-white mb-6 flex items-center gap-2">
                        <span class="text-cyan-400">👥</span> Active Enrolled Roster
                    </h3>
                    
                    <div id="roster-loader" class="py-12 text-center text-sm text-slate-500 font-bold">
                        Querying database tables...
                    </div>
                    
                    <div id="roster-container" class="grid grid-cols-1 gap-4 hidden">
                        <!-- Hydrated dynamically from data returns -->
                    </div>
                </div>
            </div>

            <!-- Right Panel Column: Fast Actions Form Panel -->
            <div class="space-y-6">
                <div class="admin-card rounded-[2rem] p-4 sm:p-6 lg:sticky lg:top-24">
                    <h3 class="text-base sm:text-lg font-black tracking-wider uppercase text-white mb-6 flex items-center gap-2">
                        <span class="text-amber-400">⏱️</span> Append Service Hours
                    </h3>
                    
                    <form id="hoursForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Select Target Volunteer</label>
                            <select id="volunteerSelect" required class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-cyan-500">
                                <option value="" disabled selected>Select from team roster...</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Hours to Assign</label>
                            <input type="number" step="0.5" min="0.5" id="hoursCount" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-cyan-500 font-mono" placeholder="e.g. 3.5">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Operation/Event Description</label>
                            <textarea id="hoursDesc" required rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-cyan-500" placeholder="e.g. Clean kit packaging assembly distribution drive"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-xs tracking-widest py-4 rounded-xl transition-all shadow-md mt-2 cursor-pointer">
                            Log Record Entry
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        const SUPABASE_URL = 'https://dzqrlgtmsgclybxfcnyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXJsZ3Rtc2djbHlieGZjbnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDIxMzMsImV4cCI6MjA5NDUxODEzM30.FAVJVqMsBDJa4qRPn6au2O0H3Bt4Vx8DNBzZPkDaDPI'; 
        
        const ALLOWED_ADMIN = "jershonvinodh@gmail.com";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Store active data state globally in view memory
        let localVolunteersArray = [];
        let localHoursMap = {};

        async function runSecurityAudit() {
            const { data: { session }, error } = await supabase.auth.getSession();

            if (error || !session) {
                window.location.href = "portal.html"; 
                return;
            }

            const activeEmail = session.user.email.toLowerCase();

            if (activeEmail !== ALLOWED_ADMIN.toLowerCase()) {
                alert("⛔ Security Firewalls Warning: Access Denied.");
                window.location.href = "portal.html";
                return;
            }

            document.getElementById("admin-email").innerText = activeEmail;
            document.getElementById("admin-body").classList.remove("hidden");
            
            fetchAdministrationData();
        }
        runSecurityAudit();

        async function fetchAdministrationData() {
            try {
                const { data: teamLogs, error: rosterErr } = await supabase
                    .from('volunteers')
                    .select('id, name, bio, image_url')
                    .order('id', { ascending: false });

                if (rosterErr) throw rosterErr;
                localVolunteersArray = teamLogs;

                const { data: hoursLogs, error: hoursErr } = await supabase
                    .from('hours_log')
                    .select('volunteer_id, hours_count');

                if (hoursErr) throw hoursErr;

                localHoursMap = {};
                hoursLogs.forEach(entry => {
                    const count = parseFloat(entry.hours_count) || 0;
                    localHoursMap[entry.volunteer_id] = (localHoursMap[entry.volunteer_id] || 0) + count;
                });

                renderRosterView();

            } catch (err) {
                console.error(err);
                document.getElementById('roster-loader').innerText = "💥 Error loading core database rows.";
            }
        }

        function renderRosterView() {
            document.getElementById('stat-total-volunteers').innerText = localVolunteersArray.length;

            const dropdown = document.getElementById('volunteerSelect');
            dropdown.innerHTML = '<option value="" disabled selected>Select from team roster...</option>';
            
            const rosterBox = document.getElementById('roster-container');
            rosterBox.innerHTML = '';

            localVolunteersArray.forEach(user => {
                const opt = document.createElement('option');
                opt.value = user.id;
                opt.innerText = user.name || "Anonymous Volunteer";
                dropdown.appendChild(opt);

                const verifiedHours = localHoursMap[user.id] || 0;

                const card = document.createElement('div');
                card.className = "bg-white/5 border border-white/10 rounded-2xl p-5 relative overflow-hidden transition-all duration-300";
                card.id = `volunteer-card-${user.id}`;
                
                // Standard Read view layout configuration with operational modifications forms
                card.innerHTML = `
                    <div class="flex items-start gap-4" id="view-layer-${user.id}">
                        <div class="w-16 h-16 rounded-full overflow-hidden flex-shrink-0 border border-white/10 relative">
                            <img src="${user.image_url}" class="w-full h-full object-cover object-top scale-125 origin-top" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=256&h=256'">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-black text-white truncate" id="text-name-${user.id}">${user.name || 'Unnamed Record'}</h4>
                            <p class="text-xs text-slate-400 line-clamp-2 mt-1 leading-relaxed" id="text-bio-${user.id}">${user.bio || 'No profile declaration.'}</p>
                            <div class="mt-3 flex items-center justify-between">
                                <div class="flex items-center gap-1.5">
                                    <span class="inline-block w-2 h-2 rounded-full bg-cyan-400"></span>
                                    <span class="text-[11px] font-black uppercase tracking-wider text-slate-300 font-mono">${verifiedHours.toFixed(1)} Lifetime Hours</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button data-id="${user.id}" class="edit-btn text-[11px] bg-white/5 hover:bg-cyan-500 hover:text-black font-bold uppercase tracking-widest px-3 py-1.5 rounded-lg border border-white/10 transition-all cursor-pointer">Edit</button>
                                    <button data-id="${user.id}" class="delete-btn text-[11px] bg-red-500/10 hover:bg-red-500 hover:text-black text-red-400 font-bold uppercase tracking-widest px-3 py-1.5 rounded-lg border border-red-500/20 transition-all cursor-pointer">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Hidden Update Inline Form Editor Input System Module Layer -->
                    <div class="hidden space-y-4" id="edit-layer-${user.id}">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Edit Volunteer Name</label>
                            <input type="text" id="input-name-${user.id}" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500" value="${user.name || ''}">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Edit Short Bio</label>
                            <textarea id="input-bio-${user.id}" rows="2" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 resize-none">${user.bio || ''}</textarea>
                        </div>
                        <div class="flex justify-end gap-2">
                            <button data-id="${user.id}" class="cancel-btn text-[10px] bg-white/5 hover:bg-white/10 font-bold uppercase tracking-wider px-3 py-1.5 rounded-lg border border-white/10 transition-all cursor-pointer">Cancel</button>
                            <button data-id="${user.id}" class="save-btn text-[10px] bg-cyan-600 hover:bg-cyan-500 text-black font-bold uppercase tracking-wider px-4 py-1.5 rounded-lg transition-all cursor-pointer">Save Changes</button>
                        </div>
                    </div>
                `;
                rosterBox.appendChild(card);
            });

            document.getElementById('roster-loader').classList.add('hidden');
            rosterBox.classList.remove('hidden');

            attachDynamicCardListeners();
        }

        function attachDynamicCardListeners() {
            // Trigger Form Edit Expansion Display Toggle State
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    document.getElementById(`view-layer-${id}`).classList.add('hidden');
                    document.getElementById(`edit-layer-${id}`).classList.remove('hidden');
                });
            });

            // Cancel Inline Form Editor Display Modification Layer
            document.querySelectorAll('.cancel-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    document.getElementById(`edit-layer-${id}`).classList.add('hidden');
                    document.getElementById(`view-layer-${id}`).classList.remove('hidden');
                });
            });

            // Save Modified Inline Form Mutations back into Database Tables
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const updatedName = document.getElementById(`input-name-${id}`).value.trim();
                    const updatedBio = document.getElementById(`input-bio-${id}`).value.trim();
                    
                    if(!updatedName) { alert("Name cannot be missing."); return; }
                    
                    e.target.disabled = true;
                    e.target.innerText = "Saving...";

                    try {
                        const { error } = await supabase
                            .from('volunteers')
                            .update({ name: updatedName, bio: updatedBio })
                            .eq('id', id);

                        if(error) throw error;

                        // Mutate active data array dynamically
                        const targetIndex = localVolunteersArray.findIndex(item => item.id == id);
                        if(targetIndex !== -1) {
                            localVolunteersArray[targetIndex].name = updatedName;
                            localVolunteersArray[targetIndex].bio = updatedBio;
                        }

                        renderRosterView();
                    } catch(err) {
                        alert("Error saving updates: " + err.message);
                        e.target.disabled = false;
                        e.target.innerText = "Save Changes";
                    }
                });
            });

            // Hard Deletion Module Flow Engine Hook
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const targetProfile = localVolunteersArray.find(item => item.id == id);
                    const profileName = targetProfile ? targetProfile.name : "this user";

                    if (confirm(`⚠️ Are you absolutely sure you want to permanently delete "${profileName}"?\nThis removes their public team card and clears their records completely.`)) {
                        try {
                            const { error } = await supabase
                                .from('volunteers')
                                .delete()
                                .eq('id', id);

                            if (error) throw error;

                            // Filter out matching indices array state element rows records
                            localVolunteersArray = localVolunteersArray.filter(item => item.id != id);
                            renderRosterView();

                        } catch (err) {
                            alert("Failed to delete record: " + err.message);
                        }
                    }
                });
            });
        }

        // Service Hours Form Application Submission
        document.getElementById('hoursForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            const volunteerId = document.getElementById('volunteerSelect').value;
            const hourValue = parseFloat(document.getElementById('hoursCount').value);
            const operationDesc = document.getElementById('hoursDesc').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerText = "Appending Data...";

            try {
                const { error } = await supabase
                    .from('hours_log')
                    .insert([{ volunteer_id: volunteerId, hours_count: hourValue, description: operationDesc }]);

                if (error) throw error;

                alert("⚡ Log verified! Contribution data records appended successfully.");
                document.getElementById('hoursCount').value = '';
                document.getElementById('hoursDesc').value = '';
                fetchAdministrationData();

            } catch (err) {
                alert("❌ Storage transmission error: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Log Record Entry";
            }
        });

        document.getElementById("logout-btn").addEventListener("click", async () => {
            await supabase.auth.signOut();
            window.location.href = "portal.html";
        });
    </script>
</body>
</html>
