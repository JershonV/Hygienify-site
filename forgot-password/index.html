<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="/Hygienify-site/logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .widget-glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2.5rem;
            transform: translateY(0px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }
        
        .widget-glass:hover {
            transform: translateY(-12px);
            border-color: rgba(34, 211, 238, 0.5);
            background: rgba(34, 211, 238, 0.04);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 relative">

<!-- 📦 WIDGET CONTAINER CARD -->
<div id="auth-card" class="w-full max-w-2xl widget-glass p-6 md:p-16 shadow-2xl relative">

    <!-- 🏠 HOME NAVIGATION LINK -->
    <div class="flex md:block mb-6 md:mb-0">
        <a href="/Hygienify-site/" ontouchstart="window.location.href='/Hygienify-site/';" class="relative md:absolute md:top-10 md:left-10 z-50 flex items-center justify-center p-2.5 rounded-xl bg-white/5 border border-white/10 hover:border-cyan-500/40 hover:bg-cyan-500/10 text-slate-400 hover:text-cyan-400 transition-all duration-300 group" title="Return to Home">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
        </a>
    </div>

    <!-- TITLE & SUBTITLE HEADER -->
    <div class="mb-8 text-center">
        <span class="text-xs font-black uppercase tracking-[0.5em] text-cyan-400 mb-3 block">Account Recovery</span>
        <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight">Forgot Password</h2>
    </div>
        
    <p class="text-slate-400 text-sm text-center mb-10 max-w-md mx-auto leading-relaxed">
        Please enter your registered email address and we'll send you an instant link to reset your password.
    </p>
    
    <!-- FORGOT PASSWORD FORM -->
    <form id="forgotForm" class="space-y-6 max-w-md mx-auto">
        <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Email Address</label>
            <input type="email" id="resetEmail" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="name@yourdomain.org">
        </div>
        
        <button type="submit" id="submitBtn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-xs tracking-widest py-5 rounded-2xl transition-all shadow-lg">
            Send Reset Link
        </button>
    </form>

    <div class="mt-8 text-center text-sm text-slate-400">
        <span>Remembered your password?</span> 
        <a href="/Hygienify-site/portal" class="text-cyan-400 font-bold hover:underline ml-1">Sign in</a>
    </div>

</div>

<!-- 🧠 SECURE SUPABASE RECOVERY LOGIC (2-STEP DATABASE VERIFICATION) -->
<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://dzqrlgtmsgclybxfcnyv.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXJsZ3Rtc2djbHlieGZjbnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDIxMzMsImV4cCI6MjA5NDUxODEzM30.FAVJVqMsBDJa4qRPn6au2O0H3Bt4Vx8DNBzZPkDaDPI'; 

    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const forgotForm = document.getElementById('forgotForm');

    forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('resetEmail').value.trim().toLowerCase();
        const submitBtn = document.getElementById('submitBtn');

        submitBtn.disabled = true;
        submitBtn.innerText = "Verifying...";
        
        try {
            // 1. CALL SECURE DATABASE CHECK
            const { data: status, error: checkError } = await supabaseClient
                .rpc('check_reset_eligibility', { lookup_email: email });

            if (checkError) {
                alert(`❌ Verification Error: ${checkError.message}`);
                return;
            }

            // 2. EVALUATE RESULTS
            if (status === 'NOT_ALLOWED') {
                alert("⛔ Access Denied: This email address is not on our pre-approved volunteers list.");
                return;
            }

            if (status === 'NO_ACCOUNT') {
                alert("⚠️ No account found: This email is pre-approved, but you haven't created a volunteer profile yet. Please sign up first.");
                return;
            }

            // 3. SEND PASSWORD RESET EMAIL IF STATUS IS 'ELIGIBLE'
            submitBtn.innerText = "Sending Link...";
            const redirectUrl = `${window.location.origin}/Hygienify-site/reset-password/`;

            const { error: resetError } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: redirectUrl
            });

            if (resetError) {
                alert(`❌ Error sending email: ${resetError.message}`);
            } else {
                alert("🎉 Password reset link sent! Check your inbox for instructions.");
                document.getElementById('resetEmail').value = '';
            }

        } catch (err) {
            console.error(err);
            alert("💥 An unexpected error occurred.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Send Reset Link";
        }
    });
</script>
