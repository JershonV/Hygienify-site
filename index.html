<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygienify | Clean Habits, Healthier Lives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.1) 0, transparent 50%),
                              radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh text-slate-900">

    <nav class="flex items-center justify-between px-6 md:px-12 py-6 bg-white/70 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="flex items-center gap-3">
            <img src="image (7).png" alt="Hygienify Logo" class="w-10 h-10 object-contain">
            <span class="text-2xl font-extrabold tracking-tight text-cyan-800">Hygienify</span>
        </div>
        <div class="hidden md:flex gap-8 font-bold text-slate-500 text-sm tracking-wide">
            <a href="#about" class="hover:text-cyan-600 transition">ABOUT</a>
            <a href="#programs" class="hover:text-cyan-600 transition">PROGRAMS</a>
            <a href="#volunteer" class="hover:text-cyan-600 transition text-cyan-600">VOLUNTEER</a>
        </div>
        <button class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-2.5 rounded-full font-bold transition shadow-lg shadow-cyan-100">
            Donate
        </button>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-16 pb-24 lg:flex items-center gap-16">
        <div class="lg:w-1/2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-50 border border-cyan-100 text-cyan-700 text-xs font-bold mb-6 tracking-widest uppercase">
                Student-Led Impact
            </div>
            <h1 class="text-5xl lg:text-7xl font-extrabold leading-[1.1] mb-8">
                Better Hygiene.<br><span class="text-cyan-600">Stronger</span> Communities.
            </h1>
            <p class="text-xl text-slate-600 mb-10 leading-relaxed">
                Empowering underserved communities through education, resource distribution, and student-led outreach.
            </p>
            <div class="flex flex-wrap gap-4">
                <a href="#volunteer" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-slate-800 transition shadow-xl">Join Us</a>
                <a href="#about" class="bg-white border border-slate-200 px-8 py-4 rounded-2xl font-bold text-lg hover:border-cyan-500 transition">Our Story</a>
            </div>
        </div>
       
        <div class="lg:w-1/2 mt-16 lg:mt-0 relative">
            <div class="absolute -inset-4 bg-cyan-200/20 rounded-[3rem] blur-3xl"></div>
            <div class="relative bg-white p-4 rounded-[3rem] shadow-2xl border border-white">
                <div class="aspect-square bg-gradient-to-br from-cyan-50 to-blue-50 rounded-[2.5rem] flex items-center justify-center p-12">
                    <img src="image (7).png" alt="Hygienify Mascot" class="w-full max-w-[300px] drop-shadow-2xl">
                </div>
            </div>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 text-center hover:shadow-md transition">
            <div class="text-5xl font-extrabold text-cyan-600 mb-2">1,000+</div>
            <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Kits Distributed</p>
        </div>
        <div class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 text-center hover:shadow-md transition">
            <div class="text-5xl font-extrabold text-blue-600 mb-2">25+</div>
            <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Events Hosted</p>
        </div>
        <div class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 text-center hover:shadow-md transition">
            <div class="text-5xl font-extrabold text-indigo-600 mb-2">300+</div>
            <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Student Volunteers</p>
        </div>
    </section>

</body>
</html>
