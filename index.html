<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

  <div class="max-w-7xl mx-auto px-6 py-16 lg:flex items-center gap-12">
    <div class="lg:w-1/2">
      <span class="inline-block px-4 py-1 rounded-full bg-cyan-100 text-cyan-700 font-bold text-sm mb-6 uppercase tracking-wider">Student-Led Impact</span>
      <h1 class="text-5xl lg:text-7xl font-black leading-tight mb-6">Clean Habits.<br><span class="text-cyan-600">Healthier</span> Lives.</h1>
      <p class="text-xl text-slate-600 mb-8 leading-relaxed">We are a student-led nonprofit bridging the gap in public health through hygiene education and essential supply distribution.</p>
      <div class="flex gap-4">
        <button class="bg-cyan-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-cyan-700 transition shadow-lg shadow-cyan-200">Join Our Mission</button>
        <button class="border-2 border-slate-200 px-8 py-4 rounded-2xl font-bold hover:bg-white transition">Our Impact</button>
      </div>
    </div>
   
    <div class="lg:w-1/2 mt-12 lg:mt-0">
      <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
        <div class="aspect-square bg-gradient-to-br from-cyan-50 to-blue-50 rounded-[2.5rem] flex items-center justify-center p-12">
            <h2 class="text-cyan-600 font-black text-3xl"><img src="logo.png" alt "Hygienify Logo"></h2>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 text-center">
      <div class="text-4xl font-black text-cyan-600">1,000+</div>
      <div class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2">Kits Distributed</div>
    </div>
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 text-center">
      <div class="text-4xl font-black text-blue-600">25+</div>
      <div class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2">Global Events</div>
    </div>
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 text-center">
      <div class="text-4xl font-black text-indigo-600">300+</div>
      <div class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2">Volunteers</div>
    </div>
  </div>

</body>
</html>
