<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hygienify | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .nav-glass { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3.5rem; }
        .blend-image { mix-blend-mode: multiply; filter: contrast(1.1) brightness(1.1); }
        .text-gradient { background: linear-gradient(to right, #22d3ee, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="image (7).png" class="w-10 h-10 blend-image" alt="Logo">
                <span class="font-extrabold text-2xl tracking-tighter">Hygienify</span>
            </div>
            <div class="hidden md:flex gap-12 items-center">
                <a href="index.html" class="text-white font-bold text-sm tracking-widest uppercase border-b-2 border-cyan-500">Home</a>
                <a href="about.html" class="text-slate-400 hover:text-white font-bold text-sm tracking-widest uppercase transition">About</a>
                <a href="programs.html" class="text-slate-400 hover:text-white font-bold text-sm tracking-widest uppercase transition">Programs</a>
                <a href="volunteer.html" class="text-slate-400 hover:text-white font-bold text-sm tracking-widest uppercase transition">Volunteer</a>
                <a href="#" class="bg-cyan-500 text-slate-950 px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest hover:scale-105 transition">Donate</a>
            </div>
        </div>
    </nav>

    <header class="min-h-screen flex items-center pt-32 pb-20 px-8">
        <div class="max-w-7xl mx-auto w-full grid lg:grid-cols-2 gap-20 items-center">
            <div class="text-center lg:text-left space-y-10">
                <h1 class="text-7xl md:text-8xl lg:text-9xl font-extrabold tracking-tighter leading-[0.85]">Cleaner <br><span class="text-gradient">Habits.</span></h1>
                <p class="text-xl md:text-2xl text-slate-400 max-w-lg mx-auto lg:mx-0 font-light">Student-led hygiene awareness for a healthier community.</p>
                <a href="volunteer.html" class="bg-white text-black px-12 py-5 rounded-[2rem] font-black text-xl hover:bg-cyan-400 transition inline-block">Join Mission</a>
            </div>
            <div class="flex justify-center relative">
                <div class="absolute -inset-20 bg-cyan-500/10 rounded-full blur-[120px]"></div>
                <img src="image (7).png" class="relative w-full max-w-[500px] blend-image scale-110" alt="Mascot">
            </div>
        </div>
    </header>

    <section class="py-32 px-8">
        <div class="max-w-6xl mx-auto glass-card p-12 lg:p-24 flex flex-col lg:flex-row items-center gap-16">
            <img src="Sophmore VP Campaign - Jershon Vinodh.jpg" class="w-72 h-72 rounded-full object-cover border-4 border-white/10 shadow-2xl" style="object-position: center 20%;" alt="Jershon">
            <div class="text-center lg:text-left space-y-8 flex-1">
                <h2 class="text-4xl lg:text-6xl font-black tracking-tight text-white">Jershon Vinodh</h2>
                <p class="text-2xl font-bold italic text-cyan-400">"It's hard to raise a student of character."</p>
                <p class="text-xl text-slate-400 font-light leading-relaxed">A Parkway West student dedicated to public health and leadership in Manchester, MO.</p>
            </div>
        </div>
    </section>
</body>
</html>
