<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Portal | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .widget-glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2.5rem;
            transform: translateY(0px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }
        
        .widget-glass:hover {
            transform: translateY(-12px);
            border-color: rgba(34, 211, 238, 0.5);
            background: rgba(34, 211, 238, 0.04);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 relative">

<!-- Fully Optimized Safe Zone Home Navigation Link with Instant Touch Execution -->
<a href="index.html" ontouchstart="window.location.href='index.html';" class="absolute top-10 left-10 z-50 flex items-center justify-center p-2.5 rounded-xl bg-white/5 border border-white/10 hover:border-cyan-500/40 hover:bg-cyan-500/10 text-slate-400 hover:text-cyan-400 transition-all duration-300 group" title="Return to Home">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
    </svg>
</a>
    
<div id="auth-card" class="w-full max-w-2xl widget-glass p-6 md:p-16 shadow-2xl">
<!-- Increased pt-16 for mobile clearance, md:pt-0 resets for desktop -->
<div class="mb-8 text-center pt-16 md:pt-0">
    <span class="text-xs font-black uppercase tracking-[0.5em] text-cyan-400 mb-3 block">Internal Access Only</span>
    <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight">Volunteer Sign In</h2>
</div>
        
        <p class="text-slate-400 text-sm text-center mb-10 max-w-md mx-auto leading-relaxed">
            Please enter your pre-approved organizational email and password to access the profile manager.
        </p>
        
        <form id="authForm" class="space-y-6 max-w-md mx-auto">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Email Address</label>
                <input type="email" id="authEmail" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="name@yourdomain.org">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Password</label>
                <!-- 👁️ Relative wrapper for overlaying the show/hide utility -->
                <div class="relative">
                    <input type="password" id="authPassword" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 pr-14 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="••••••••">
                    
                    <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-cyan-400 transition-colors focus:outline-none p-2">
                        <!-- Eye Closed Icon (Default state) -->
                        <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                        <!-- Eye Open Icon (Hidden state) -->
                        <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 hidden">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-xs tracking-widest py-5 rounded-2xl transition-all shadow-lg">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-400">
            <span>Don't have an account?</span> 
            <a href="signup.html" class="text-cyan-400 font-bold hover:underline ml-1">Sign up</a>
        </div>
    </div>

    <!-- Profile Portal Form -->
<div id="portal-card" class="w-full max-w-2xl widget-glass p-6 md:p-16 shadow-2xl hidden">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-10 border-b border-white/5 pb-6">
            <div>
                <h2 class="text-4xl font-black text-white tracking-tight">Profile Portal</h2>
                <p class="text-slate-400 text-sm mt-1">Authorized Active Session: <span id="userBadge" class="text-cyan-400 font-bold"></span></p>
            </div>
            <button id="logoutBtn" class="text-xs bg-white/5 hover:bg-red-500/20 hover:text-red-400 text-slate-400 border border-white/10 font-bold uppercase tracking-widest px-5 py-3 rounded-xl transition self-start sm:self-auto">
                Sign Out
            </button>
        </div>
        
        <form id="portalForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Display Name</label>
                <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Short Bio (Quotes)</label>
                <textarea id="bio" required rows="4" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder='"Helping distribute kits..."'></textarea>
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Portrait Image File</label>
                <!-- 🛠️ FIXED: Removed HTML "required" flag so portrait updates are elegantly flexible -->
                <input type="file" id="imageFileInput" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-slate-400 focus:outline-none focus:border-cyan-500 transition text-sm file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-cyan-500/10 file:text-cyan-400 hover:file:bg-cyan-500/20 file:cursor-pointer cursor-pointer">
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-xs tracking-widest py-5 rounded-2xl transition-all">
                Publish Updates
            </button>
        </form>
    </div>

<!-- 🧠 Updated JavaScript for BigInt Table Support -->
<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://dzqrlgtmsgclybxfcnyv.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXJsZ3Rtc2djbHlieGZjbnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDIxMzMsImV4cCI6MjA5NDUxODEzM30.FAVJVqMsBDJa4qRPn6au2O0H3Bt4Vx8DNBzZPkDaDPI'; 

    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authCard = document.getElementById('auth-card');
    const portalCard = document.getElementById('portal-card');
    const authForm = document.getElementById('authForm');
    
    let authenticatedUserInstance = null;

    function initPasswordToggle() {
        const passwordInput = document.getElementById('authPassword');
        const toggleButton = document.getElementById('toggle-password');
        
        if (!passwordInput || !toggleButton) return;
        
        const eyeOpen = toggleButton.querySelector('#eye-open');
        const eyeClosed = toggleButton.querySelector('#eye-closed');

        toggleButton.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        initPasswordToggle();
    });

    // 🔒 SECURE AUTOMATED SMART ROUTING ENGINE
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('authEmail').value.trim().toLowerCase();
        const password = document.getElementById('authPassword').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.innerText = "Authenticating...";
        
        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert(`❌ Authentication Failed: ${error.message}`);
                return;
            }

            if (data.user) {
                authenticatedUserInstance = data.user;
                const loggedInEmail = data.user.email.toLowerCase();
                const ADMIN_EMAIL = "jershonvinodh@gmail.com";

                if (loggedInEmail === ADMIN_EMAIL) {
                    window.location.href = "admin.html";
                    return;
                }

                // 🔍 LOOKUP FIXED: Now queries by the user_id column instead of id
                const { data: profile, error: profileErr } = await supabaseClient
                    .from('volunteers')
                    .select('user_id')
                    .eq('user_id', data.user.id)
                    .maybeSingle();

                if (profile) {
                    window.location.href = "dashboard.html";
                    return;
                } else {
                    document.getElementById('userBadge').innerText = data.user.email;
                    authCard.classList.add('hidden');
                    portalCard.classList.remove('hidden');
                }
            }
        } catch (err) {
            console.error(err);
            alert("💥 An unexpected authentication error occurred.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Sign In";
        }
    });

    // 🌐 ANTI-DUPLICATION DATA INGESTION ENGINE
    document.getElementById('portalForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!authenticatedUserInstance) {
            alert("Session error. Please refresh and log in again.");
            return;
        }

        const volunteerName = document.getElementById('name').value.trim();
        const volunteerBio = document.getElementById('bio').value.trim();
        const fileInput = document.getElementById('imageFileInput');
        const file = fileInput.files[0];
        const submitBtn = e.target.querySelector('button[type="submit"]');

        let finalAvatarDataString = null;

        submitBtn.disabled = true;
        submitBtn.innerText = "Publishing Profile...";

        try {
            if (file) {
                const MAX_SIZE_KB = 300;
                const MAX_SIZE_BYTES = MAX_SIZE_KB * 1024;
                if (file.size > MAX_SIZE_BYTES) {
                    alert(`⛔ File too large! Please choose a photo smaller than 300KB.`);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Publish Updates";
                    return;
                }

                finalAvatarDataString = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => resolve(event.target.result);
                    reader.onerror = (err) => reject(err);
                    reader.readAsDataURL(file);
                });
            }

            // 🛡️ UPSERT FIXED: We search on user_id to decide whether to update or create.
            // Leaving the numeric 'id' completely alone lets your database auto-increment it natively!
            const { error: dbError } = await supabaseClient
                .from('volunteers')
                .upsert({ 
                    user_id: authenticatedUserInstance.id,
                    name: volunteerName, 
                    bio: volunteerBio, 
                    image_url: finalAvatarDataString
                }, { onConflict: 'user_id' }); // Ensures protection works through our new user_id key

            if (dbError) throw dbError;

            alert("🎉 Success! Your profile card is officially published.");
            window.location.href = 'dashboard.html';

        } catch (error) {
            alert("❌ Supabase Transmission Error: " + error.message);
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish Updates";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.reload();
    });
</script>
</body>
</html>
