<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Portal | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #030712; 
            color: #f3f4f6; 
        }
        .widget-glass {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 relative">

    <!-- 📦 MAIN CONTAINER CARD (SIGN IN) -->
    <div id="auth-card" class="w-full max-w-[440px] widget-glass p-8 md:p-10 relative">
        
        <!-- Home Button (Matches Signup Box Layout Perfectly) -->
        <div class="mb-8">
            <a href="index.html" onclick="window.location.href='index.html';" class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-[#1e293b]/40 border border-white/10 text-slate-400 hover:text-white hover:border-white/20 transition-all duration-200" title="Return to Home">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
            </a>
        </div>

        <!-- Header -->
        <div class="text-center mb-6">
            <span class="text-xs font-bold uppercase tracking-[0.25em] text-[#22d3ee] mb-3 block">Internal Access Only</span>
            <h2 class="text-4xl font-extrabold text-white tracking-tight leading-tight">Volunteer Sign In</h2>
        </div>

        <!-- Warning Callout (Identical warning style) -->
        <div class="text-center mb-8 px-2">
            <p class="text-[11px] text-[#fbbf24] font-bold tracking-wider uppercase leading-relaxed">
                ⚠️ THIS PORTAL IS STRICTLY FOR AUTHORIZED VOLUNTEERS ONLY.
            </p>
        </div>
        
        <!-- Intro Text -->
        <p class="text-[#94a3b8] text-sm text-center mb-8 px-4 leading-relaxed">
            Please enter your pre-approved organizational email and password to access the profile manager.
        </p>
        
        <!-- Form -->
        <form id="authForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2.5">Email Address</label>
                <input type="email" id="authEmail" required class="w-full bg-[#0f172a]/40 border border-white/10 rounded-2xl py-4.5 px-5 text-white placeholder-slate-600 focus:outline-none focus:border-[#22d3ee]/50 transition text-base" placeholder="name@yourdomain.org">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2.5">Password</label>
                <div class="relative">
                    <input type="password" id="authPassword" required class="w-full bg-[#0f172a]/40 border border-white/10 rounded-2xl py-4.5 px-5 pr-12 text-white placeholder-slate-600 focus:outline-none focus:border-[#22d3ee]/50 transition text-base" placeholder="••••••••">
                    
                    <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors focus:outline-none">
                        <!-- Eye Closed Icon -->
                        <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                        <!-- Eye Open Icon -->
                        <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-[#06b6d4] hover:bg-[#22d3ee] text-[#030712] font-extrabold uppercase text-xs tracking-wider py-4.5 rounded-2xl transition-all duration-200 shadow-lg shadow-cyan-500/10">
                Sign In
            </button>
        </form>

        <!-- Footer Link -->
        <div class="mt-8 text-center text-sm text-slate-400">
            <span>Don't have an account?</span> 
            <a href="signup.html" class="text-[#22d3ee] font-bold hover:underline ml-1">Sign up</a>
        </div>
    </div>

    <!-- PROFILE PORTAL FORM (POST-LOGIN) -->
    <div id="portal-card" class="w-full max-w-[440px] widget-glass p-8 md:p-10 relative hidden">
        <div class="mb-8">
            <a href="index.html" onclick="window.location.href='index.html';" class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-[#1e293b]/40 border border-white/10 text-slate-400 hover:text-white hover:border-white/20 transition-all duration-200" title="Return to Home">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
            </a>
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8 border-b border-white/5 pb-6">
            <div>
                <h2 class="text-3xl font-extrabold text-white tracking-tight">Profile Portal</h2>
                <p class="text-xs text-slate-400 mt-1">Active Session: <span id="userBadge" class="text-[#22d3ee] font-bold"></span></p>
            </div>
            <button id="logoutBtn" class="text-xs bg-white/5 hover:bg-red-500/20 hover:text-red-400 text-slate-400 border border-white/10 font-bold uppercase tracking-widest px-4 py-2.5 rounded-xl transition self-start sm:self-auto">
                Sign Out
            </button>
        </div>
        
        <form id="portalForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2.5">Display Name</label>
                <input type="text" id="name" required class="w-full bg-[#0f172a]/40 border border-white/10 rounded-2xl py-4.5 px-5 text-white focus:outline-none focus:border-[#22d3ee]/50 transition text-base">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2.5">Short Bio (Quotes)</label>
                <textarea id="bio" required rows="4" class="w-full bg-[#0f172a]/40 border border-white/10 rounded-2xl py-4 px-5 text-white focus:outline-none focus:border-[#22d3ee]/50 transition text-base" placeholder='"Helping distribute kits..."'></textarea>
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2.5">Portrait Image File</label>
                <input type="file" id="imageFileInput" accept="image/*" class="w-full bg-[#0f172a]/40 border border-white/10 rounded-2xl p-4 text-slate-400 focus:outline-none focus:border-[#22d3ee]/50 transition text-sm file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-[#22d3ee]/10 file:text-[#22d3ee] hover:file:bg-[#22d3ee]/20 file:cursor-pointer cursor-pointer">
            </div>

            <button type="submit" class="w-full bg-[#06b6d4] hover:bg-[#22d3ee] text-[#030712] font-extrabold uppercase text-xs tracking-wider py-4.5 rounded-2xl transition-all duration-200 shadow-lg shadow-cyan-500/10">
                Publish Updates
            </button>
        </form>
    </div>

    <!-- Bottom Attribution Badge -->
    <div class="mt-8">
        <a href="https://jershonv.github.io" target="_blank" class="text-xs bg-[#1e293b]/50 border border-white/10 rounded-full py-2 px-6 text-slate-400 hover:text-white transition-all duration-200">
            jershonv.github.io
        </a>
    </div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://dzqrlgtmsgclybxfcnyv.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXJsZ3Rtc2djbHlieGZjbnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDIxMzMsImV4cCI6MjA5NDUxODEzM30.FAVJVqMsBDJa4qRPn6au2O0H3Bt4Vx8DNBzZPkDaDPI'; 

    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authCard = document.getElementById('auth-card');
    const portalCard = document.getElementById('portal-card');
    const authForm = document.getElementById('authForm');
    
    let authenticatedUserInstance = null;

    function initPasswordToggle() {
        const passwordInput = document.getElementById('authPassword');
        const toggleButton = document.getElementById('toggle-password');
        
        if (!passwordInput || !toggleButton) return;
        
        const eyeOpen = toggleButton.querySelector('#eye-open');
        const eyeClosed = toggleButton.querySelector('#eye-closed');

        toggleButton.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        initPasswordToggle();
    });

    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('authEmail').value.trim().toLowerCase();
        const password = document.getElementById('authPassword').value;
        const submitBtn = e.target.querySelector('button[type="submit"]');

        submitBtn.disabled = true;
        submitBtn.innerText = "Authenticating...";
        
        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert(`❌ Authentication Failed: ${error.message}`);
                return;
            }

            if (data.user) {
                authenticatedUserInstance = data.user;
                const loggedInEmail = data.user.email.toLowerCase();
                const ADMIN_EMAIL = "jershonvinodh@gmail.com";

                if (loggedInEmail === ADMIN_EMAIL) {
                    window.location.href = "admin.html";
                    return;
                }

                const { data: profile, error: profileErr } = await supabaseClient
                    .from('volunteers')
                    .select('user_id')
                    .eq('user_id', data.user.id)
                    .maybeSingle();

                if (profile) {
                    window.location.href = "dashboard.html";
                    return;
                } else {
                    document.getElementById('userBadge').innerText = data.user.email;
                    authCard.classList.add('hidden');
                    portalCard.classList.remove('hidden');
                }
            }
        } catch (err) {
            console.error(err);
            alert("💥 An unexpected authentication error occurred.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Sign In";
        }
    });

    document.getElementById('portalForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!authenticatedUserInstance) {
            alert("Session error. Please refresh and log in again.");
            return;
        }

        const volunteerName = document.getElementById('name').value.trim();
        const volunteerBio = document.getElementById('bio').value.trim();
        const fileInput = document.getElementById('imageFileInput');
        const file = fileInput.files[0];
        const submitBtn = e.target.querySelector('button[type="submit"]');

        let finalAvatarDataString = null;

        submitBtn.disabled = true;
        submitBtn.innerText = "Publishing Profile...";

        try {
            if (file) {
                const MAX_SIZE_KB = 300;
                const MAX_SIZE_BYTES = MAX_SIZE_KB * 1024;
                if (file.size > MAX_SIZE_BYTES) {
                    alert(`⛔ File too large! Please choose a photo smaller than 300KB.`);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Publish Updates";
                    return;
                }

                finalAvatarDataString = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => resolve(event.target.result);
                    reader.onerror = (err) => reject(err);
                    reader.readAsDataURL(file);
                });
            }

            const { error: dbError } = await supabaseClient
                .from('volunteers')
                .upsert({ 
                    user_id: authenticatedUserInstance.id,
                    name: volunteerName, 
                    bio: volunteerBio, 
                    image_url: finalAvatarDataString
                }, { onConflict: 'user_id' });

            if (dbError) throw dbError;

            alert("🎉 Success! Your profile card is officially published.");
            window.location.href = 'dashboard.html';

        } catch (error) {
            alert("❌ Supabase Transmission Error: " + error.message);
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish Updates";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        window.location.reload();
    });
</script>
</body>
</html>
