<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Portal | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .widget-glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2.5rem;
            transform: translateY(0px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }
        
        .widget-glass:hover {
            transform: translateY(-12px);
            border-color: rgba(34, 211, 238, 0.5);
            background: rgba(34, 211, 238, 0.04);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="auth-card" class="w-full max-w-2xl widget-glass p-16 shadow-2xl">
        <div class="mb-8 text-center">
            <span class="text-xs font-black uppercase tracking-[0.5em] text-cyan-400 mb-3 block">Internal Access Only</span>
            <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight">Volunteer Sign In</h2>
            <p class="text-xs text-amber-400/80 font-semibold tracking-wider uppercase mt-3">⚠️ This portal is strictly for authorized volunteers only.</p>
        </div>
        
        <p class="text-slate-400 text-sm text-center mb-10 max-w-md mx-auto leading-relaxed">
            Please enter your pre-approved organizational email and password to access the profile manager.
        </p>
        
        <form id="authForm" class="space-y-6 max-w-md mx-auto">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Email Address</label>
                <input type="email" id="authEmail" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="name@yourdomain.org">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Password</label>
                <input type="password" id="authPassword" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-xs tracking-widest py-5 rounded-2xl transition-all shadow-lg">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-400">
            <span>Don't have an account?</span> 
            <button id="signup-notice-btn" class="text-cyan-400 font-bold hover:underline focus:outline-none ml-1">Sign up</button>
        </div>
    </div>

    <div id="portal-card" class="w-full max-w-2xl widget-glass p-16 shadow-2xl hidden">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-10 border-b border-white/5 pb-6">
            <div>
                <h2 class="text-4xl font-black text-white tracking-tight">Profile Portal</h2>
                <p class="text-slate-400 text-sm mt-1">Authorized Active Session: <span id="userBadge" class="text-cyan-400 font-bold"></span></p>
            </div>
            <button id="logoutBtn" class="text-xs bg-white/5 hover:bg-red-500/20 hover:text-red-400 text-slate-400 border border-white/10 font-bold uppercase tracking-widest px-5 py-3 rounded-xl transition self-start sm:self-auto">
                Sign Out
            </button>
        </div>
        
        <form id="portalForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Display Name</label>
                <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Short Bio (Quotes)</label>
                <textarea id="bio" required rows="4" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder='"Helping distribute kits..."'></textarea>
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Portrait Image Link / URL</label>
                <input type="url" id="imageUrlInput" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="https://example.com/your-image.jpg">
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-xs tracking-widest py-5 rounded-2xl transition-all">
                Publish Updates
            </button>
        </form>
    </div>

    <script>
        // =========================================================================
        // 🔑 AUTHORIZED VOLUNTEER CREDENTIALS DIRECTORY
        // =========================================================================
        // Simply add or change allowed combinations here!
        const VOLUNTEER_DIRECTORY = {
            "admin@hygienify.org": "password123",
            "volunteer1@gmail.com": "securepass2026",
            "test@hygienify.org": "hygienify2026"
        };

        const authCard = document.getElementById('auth-card');
        const portalCard = document.getElementById('portal-card');
        const authForm = document.getElementById('authForm');
        const signupBtn = document.getElementById('signup-notice-btn');

        // Alert message for new sign ups seeking permission
        signupBtn.addEventListener('click', () => {
            alert("📝 Account Registration: To protect roster integrity, logins are pre-provisioned. Please message your administrator or coordinator to have your custom credentials added to the system list.");
        });

        // Sign In Request Validation Block
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const password = document.getElementById('authPassword').value;

            // Check if the email exists in our directory list
            if (!VOLUNTEER_DIRECTORY.hasOwnProperty(email)) {
                alert("⛔ Access Denied: This email address is not found in our authorized volunteer registry.");
                return;
            }

            // Check if the matching password is correct
            if (VOLUNTEER_DIRECTORY[email] !== password) {
                alert("❌ Authentication Failed: Incorrect password entered for this user account.");
                return;
            }

            // If clean match, transition screens smoothly
            document.getElementById('userBadge').innerText = email;
            authCard.classList.add('hidden');
            portalCard.classList.remove('hidden');
        });

        // Handle profile submit (Adjusted to a simple console logger or custom hook)
        document.getElementById('portalForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const imgUrl = document.getElementById('imageUrlInput').value;
            
            alert(`Profile Updated Live!\nName: ${name}\nBio: ${bio}\nImage: ${imgUrl}`);
            // You can link this data destination wherever you like next!
        });

        // Sign Out Event Listener
        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
