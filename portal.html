<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Portal | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #164e63; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }

        .nav-glass { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .logo-centerpiece {
            mix-blend-mode: screen; 
            filter: brightness(1.2) contrast(1.2) drop-shadow(0 0 40px rgba(34, 211, 238, 0.3));
            image-rendering: -webkit-optimize-contrast;
        }

        /* --- THE UNIFIED LOGIC (REVEAL TRANSITIONS REMOVED) --- */
        .widget-glass, .footer-widget {
            --hover-lift: 0px;
            
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2.5rem;
            
            /* Position uses simple hover transform tracking */
            transform: translateY(var(--hover-lift));
            
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        border-color 0.4s ease, 
                        background 0.4s ease, 
                        box-shadow 0.4s ease;
        }

        .widget-glass:hover, .footer-widget:hover {
            --hover-lift: -12px;
            border-color: rgba(34, 211, 238, 0.5);
            background: rgba(34, 211, 238, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .text-gradient {
            background: linear-gradient(to right, #22d3ee, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #mobile-menu { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; pointer-events: none; visibility: hidden; }
        #mobile-menu.active { opacity: 1; pointer-events: auto; visibility: visible; }
        .menu-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); border-radius: 1.5rem; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; color: #f8fafc;
        }
        .menu-card.active {
            background: rgba(34, 211, 238, 0.1); border-color: rgba(34, 211, 238, 0.4);
            box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.1); color: #22d3ee;
        }
        
        .nav-link.active { color: #22d3ee !important; }

        .qr-container { filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.2)); transition: all 0.4s ease; }
        .footer-widget:hover .qr-container { filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.5)); }

        .spotlight {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: -1;
            background: radial-gradient(600px circle at var(--x) var(--y), rgba(34, 211, 238, 0.07), transparent 80%);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-xl widget-glass p-12 shadow-2xl">
        <h2 class="text-3xl font-black mb-2 text-white">Volunteer Roster Portal</h2>
        <p class="text-slate-400 text-sm mb-8">Fill out your public profile details to automatically sync your card onto the Team page.</p>
        
        <form id="portalForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">First Name Only</label>
                <input type="text" id="name" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-cyan-500 transition">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Short Bio (Quotes)</label>
                <textarea id="bio" required rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-cyan-500 transition" placeholder='"Ex. A student, who loves to play..."'></textarea>
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Portrait Image File</label>
                <input type="file" id="imageFile" accept="image/*" required class="w-full text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-cyan-500/10 file:text-cyan-400 hover:file:bg-cyan-500/20">
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold uppercase text-xs tracking-widest py-4 rounded-xl transition-all">
                Submit Profile Live
            </button>
        </form>
    </div>

    <div class="spotlight"></div>

    <script>
        // Initialize connection to your cloud data bucket
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Spotlight effect logic
        const spotlight = document.querySelector('.spotlight');
        window.addEventListener('mousemove', e => {
            spotlight.style.setProperty('--x', `${e.clientX}px`);
            spotlight.style.setProperty('--y', `${e.clientY}px`);
        });

        document.getElementById('portalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const file = document.getElementById('imageFile').files[0];
            
            // 1. Create a clean file name and upload the image to storage
            const fileExtension = file.name.split('.').pop();
            const fileName = `${Date.now()}-${name}.${fileExtension}`;
            
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('volunteer-portraits')
                .upload(fileName, file);
                
            if (uploadError) { alert('Error uploading image!'); return; }

            // 2. Grab the public web URL of that image
            const { data: urlData } = supabase.storage
                .from('volunteer-portraits')
                .getPublicUrl(fileName);
                
            const imageUrl = urlData.publicUrl;

            // 3. Save the name, bio, and image link down to the table
            const { error: dbError } = await supabase
                .from('volunteers')
                .insert([{ name, bio, image_url: imageUrl }]);

            if (dbError) {
                alert('Database Error!');
            } else {
                alert('Success! Your profile is now live on the Team page.');
                window.location.href = 'team.html';
            }
        });
    </script>
</body>
</html>
