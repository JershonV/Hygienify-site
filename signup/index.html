<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Registration | Hygienify</title>
    <link rel="icon" type="image/svg+xml" href="logo_new2.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .widget-glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2.5rem;
            transform: translateY(0px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }
        
        .widget-glass:hover {
            transform: translateY(-12px);
            border-color: rgba(34, 211, 238, 0.5);
            background: rgba(34, 211, 238, 0.04);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-6 relative">

<!-- Fully Optimized Safe Zone Home Navigation Link with Instant Touch Execution -->
<!-- 📦 WIDGET CONTAINER CARD -->
<div id="auth-card" class="w-full max-w-2xl widget-glass p-6 md:p-16 shadow-2xl relative">

    <!-- 🏠 HOME NAVIGATION LINK: Flows inside the widget on mobile, absolute pinned on desktop -->
    <div class="flex md:block mb-6 md:mb-0">
        <a href="index.html" ontouchstart="window.location.href='index.html';" class="relative md:absolute md:top-10 md:left-10 z-50 flex items-center justify-center p-2.5 rounded-xl bg-white/5 border border-white/10 hover:border-cyan-500/40 hover:bg-cyan-500/10 text-slate-400 hover:text-cyan-400 transition-all duration-300 group" title="Return to Home">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
        </a>
    </div>
       
        <div class="mb-8 text-center">
            <span class="text-xs font-black uppercase tracking-[0.5em] text-cyan-400 mb-3 block">Account Registration</span>
            <h2 class="text-4xl md:text-5xl font-black text-white tracking-tight">Create Account</h2>
        </div>
        
        <p class="text-slate-400 text-sm text-center mb-10 max-w-md mx-auto leading-relaxed">
            Type your verified volunteer email below to validate your credentials and establish your personal access password.
        </p>
        
        <form id="signupForm" class="space-y-6 max-w-md mx-auto">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Verified Email Address</label>
                <input type="email" id="regEmail" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="name@yourdomain.org">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Choose Password</label>
                <div class="relative">
                    <input type="password" id="regPassword" required minlength="6" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 pr-14 text-white focus:outline-none focus:border-cyan-500 transition text-base" placeholder="Minimum 6 characters">
                    
                    <button type="button" id="toggle-signup-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-cyan-400 transition-colors focus:outline-none p-2">
                        <!-- Eye Closed Icon -->
                        <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                        <!-- Eye Open Icon -->
                        <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 hidden">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase text-[11px] sm:text-xs tracking-wider px-4 sm:px-6 py-5 rounded-2xl transition-all shadow-lg">
                Register & Verify Account
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-400">
            <span>Already have an account?</span> 
            <a href="portal.html" class="text-cyan-400 font-bold hover:underline ml-1 whitespace-nowrap">Sign in</a>
        </div>
    </div>

    <!-- 🧠 Script Engine Utilities -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = "https://dzqrlgtmsgclybxfcnyv.supabase.co"
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXJsZ3Rtc2djbHlieGZjbnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDIxMzMsImV4cCI6MjA5NDUxODEzM30.FAVJVqMsBDJa4qRPn6au2O0H3Bt4Vx8DNBzZPkDaDPI"
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // =========================================================================
    // 👁️ PASSWORD VISIBILITY TOGGLE (RESTORED & RUNNING RIGHT AWAY)
    // =========================================================================
    const passwordInput = document.getElementById('regPassword');
    const toggleButton = document.getElementById('toggle-signup-password');
    
    if (passwordInput && toggleButton) {
        const eyeOpen = toggleButton.querySelector('#eye-open');
        const eyeClosed = toggleButton.querySelector('#eye-closed');

        toggleButton.addEventListener('click', (e) => {
            e.preventDefault();
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            }
        });
    }

    // =========================================================================
    // ⚙️ FORM SUBMISSION & SUPABASE ROUTING LOGIC
    // =========================================================================
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPassword').value;

        if (password.length < 6) {
            alert("🔒 Password must be at least 6 characters long.");
            return;
        }

        try {
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    // Force the token drop-off to line up perfectly with your site URL config
                    redirectTo: 'https://jershonv.github.io/Hygienify-site/index.html'
                } 
            });

            if (error) {
                alert(`⛔ Registration Error: ${error.message}`);
                return;
            }

            if (data?.user && data.user.identities && data.user.identities.length === 0) {
                alert("📧 An account with this email address already exists. Redirecting you to the sign-in portal.");
                window.location.href = 'portal.html';
                return;
            }

            alert("🎉 Registration initiated! Go to the Sign In page to access your account!");

        } catch (err) {
            console.error(err);
            alert("💥 An unexpected error occurred during registration. Check your console log.");
        }
    });
</script>
</body>
</html>
