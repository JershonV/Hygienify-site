<!DOCTYPE html>
<html lang="en">
<head>

    <title>Volunteer | Hygienify</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .nav-glass { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="image (7).png" class="w-8 h-8" alt="Logo">
                <span class="font-extrabold text-2xl tracking-tight">Hygienify</span>
            </div>
            <div class="hidden md:flex gap-12 font-semibold text-slate-400 text-xs tracking-[0.2em]">
                <a href="index.html" class="hover:text-white transition">HOME</a>
                <a href="about.html" class="hover:text-white transition">ABOUT</a>
                <a href="programs.html" class="hover:text-white transition">PROGRAMS</a>

                <p class="text-xl text-slate-300 leading-relaxed">
                    We are looking for students who want to lead. Whether it's organizing a donation drive at Parkway West or hosting a seminar, your character makes the difference.
                </p>
                <a href="mailto:vinodhj1291@parkwayschools.net" class="inline-block bg-white text-black px-12 py-5 rounded-3xl font-bold text-lg hover:bg-cyan-400 transition shadow-2xl shadow-cyan-500/20">
